<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Minecraft Pixeler - Professional Skin Editor</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>

  <!-- Start-Animation -->
  <div id="start-screen">
    <div class="grass-block">
      <div class="grass-top"></div>
      <div class="grass-side"></div>
    </div>
    <h1 id="start-title">MINECRAFT PIXELER</h1>
    <div id="particles"></div>
  </div>

  <!-- Hauptapp -->
  <div id="app" class="hidden">

    <!-- Kopfleiste -->
    <header id="topbar">
      <div class="logo">🎮 Minecraft Pixeler</div>
      <div class="topbar-actions">
        <button id="btn-import" class="btn">📁 Import</button>
        <button id="btn-export" class="btn btn-primary">💾 Export</button>
        <button id="btn-undo" class="btn" title="Ctrl+Z">↩️</button>
        <button id="btn-redo" class="btn" title="Ctrl+Y">↪️</button>
      </div>
    </header>

    <div id="main-layout">

      <!-- Werkzeugleiste -->
      <aside id="toolbar">
        <button class="tool active" data-tool="brush" title="Pinsel (B)">🖌️</button>
        <button class="tool" data-tool="eraser" title="Radierer (E)">🧹</button>
        <button class="tool" data-tool="bucket" title="Farbeimer (F)">🪣</button>
        <button class="tool" data-tool="eyedropper" title="Pipette (I)">🔍</button>
        <button class="tool" data-tool="line" title="Linie">📏</button>
        <button class="tool" data-tool="rectangle" title="Rechteck">▭</button>
        <button class="tool" data-tool="circle" title="Kreis">●</button>
        <button class="tool" data-tool="select" title="Auswahl">⊞</button>
        <button class="tool" data-tool="mirror" title="Spiegeln">↔️</button>
        <button class="tool" data-tool="copy" title="Kopieren">📋</button>
        <hr />
        <button id="btn-grid" class="tool" title="Gitter (G)">▦</button>
      </aside>

      <!-- Editor-Bereich -->
      <main id="editor-area">
        <div id="zoom-controls">
          <button id="zoom-out">−</button>
          <span id="zoom-level">400%</span>
          <button id="zoom-in">+</button>
        </div>
        <div id="canvas-wrapper">
          <canvas id="skin-canvas" width="64" height="64"></canvas>
          <canvas id="grid-canvas" width="64" height="64"></canvas>
        </div>
        <div id="layer-tabs">
          <button class="layer-tab active" data-layer="base">Base Layer</button>
          <button class="layer-tab" data-layer="overlay">Overlay Layer</button>
          <button id="btn-toggle-layer" title="Ebene ein/ausblenden">👁️</button>
        </div>
      </main>

      <!-- 3D-Vorschau -->
      <section id="preview-panel">
        <div id="preview-canvas-wrapper">
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="preview-controls">
          <button id="btn-auto-rotate" class="btn">🔄 Auto-Rotation</button>
          <button id="btn-animate" class="btn">🚶 Bewegung</button>
          <label class="slim-toggle">
            <input type="checkbox" id="slim-arms" />
            Slim Arms
          </label>
        </div>
      </section>

      <!-- Farb-Panel -->
      <aside id="color-panel">
        <div id="color-wheel-wrapper">
          <canvas id="color-wheel" width="180" height="180"></canvas>
        </div>
        <div class="color-inputs">
          <label>HEX <input type="text" id="hex-input" value="#FFFFFF" /></label>
          <div class="rgb-inputs">
            <label>R <input type="number" id="r-input" min="0" max="255" value="255" /></label>
            <label>G <input type="number" id="g-input" min="0" max="255" value="255" /></label>
            <label>B <input type="number" id="b-input" min="0" max="255" value="255" /></label>
          </div>
          <label>Alpha
            <input type="range" id="alpha-input" min="0" max="255" value="255" />
          </label>
        </div>
        <div id="mc-palette" class="palette-grid"></div>
        <div id="recent-colors" class="palette-grid"></div>
      </aside>

    </div>
  </div>

  <input type="file" id="file-input" accept="image/png" hidden />

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
