<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Egoshooter - Combat Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        /* Menu Styles */
        #mainMenu {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .menu-container {
            text-align: center;
        }
        
        .game-title {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .menu-buttons {
            display: flex;
            gap: 20px;
            flex-direction: column;
            margin-top: 40px;
        }
        
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        /* HUD Styles */
        #hud {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            pointer-events: none;
        }
        
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #00ff88;
        }
        
        .crosshair::before {
            width: 2px;
            height: 10px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .crosshair::after {
            width: 10px;
            height: 2px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ff88;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #health-bar {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            border-radius: 5px;
            padding: 10px;
        }
        
        .health-fill {
            width: 100%;
            height: 30px;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            border-radius: 3px;
            transition: width 0.2s;
        }
        
        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            pointer-events: none;
        }
        
        #ammo-display {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ccff;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        #inventory {
            position: fixed;
            bottom: 150px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ccff;
            padding: 15px;
            border-radius: 5px;
            max-width: 250px;
        }
        
        .inventory-title {
            color: #00ccff;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ccff;
            padding-bottom: 5px;
        }
        
        .inventory-item {
            padding: 5px 0;
            font-size: 0.9em;
            color: #00ff88;
        }
        
        #minimap {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ccff;
            border-radius: 5px;
        }
        
        #stats {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            padding: 15px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .stat-line {
            margin: 5px 0;
            color: #00ff88;
        }
        
        #gameOver {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
        }
        
        .game-over-text {
            font-size: 3em;
            margin-bottom: 30px;
            color: #ff4444;
        }
        
        .final-stats {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #00ff88;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <!-- Main Menu -->
    <div id="mainMenu">
        <div class="menu-container">
            <div class="game-title">⚔️ COMBAT ARENA</div>
            <div style="font-size: 1.2em; color: #00ccff; margin: 20px 0;">3D Egoshooter</div>
            <div class="menu-buttons">
                <button id="playBtn">SPIELEN</button>
                <button id="difficultyBtn">SCHWIERIGKEIT: NORMAL</button>
                <button id="creditsBtn">CREDITS</button>
            </div>
        </div>
    </div>
    
    <!-- Game Over Screen -->
    <div id="gameOver">
        <div class="game-over-text" id="gameOverTitle">GAME OVER</div>
        <div class="final-stats">
            <p>Gegner besiegt: <span id="enemiesKilled">0</span></p>
            <p>Punkte: <span id="finalScore">0</span></p>
            <p>Zeit: <span id="survivalTime">0:00</span></p>
        </div>
        <button id="restartBtn" style="margin-top: 20px;">NEUSTARTEN</button>
    </div>
    
    <!-- HUD -->
    <div id="hud">
        <div class="crosshair">
            <div class="dot"></div>
        </div>
        
        <div id="health-bar">
            <div class="health-fill" id="healthFill"></div>
            <div class="health-text" id="healthText">100/100</div>
        </div>
        
        <div id="ammo-display">
            <div id="ammoText">30 / 120</div>
            <div style="font-size: 0.8em; color: #00ccff; margin-top: 5px;" id="weaponName">AR-15</div>
        </div>
        
        <div id="inventory">
            <div class="inventory-title">📦 INVENTAR</div>
            <div id="inventoryList"></div>
        </div>
        
        <canvas id="minimap"></canvas>
        
        <div id="stats">
            <div class="stat-line">FPS: <span id="fps">60</span></div>
            <div class="stat-line">GEGNER: <span id="enemyCount">0</span></div>
            <div class="stat-line">PUNKTE: <span id="score">0</span></div>
            <div class="stat-line">LEVEL: <span id="level">1</span></div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
